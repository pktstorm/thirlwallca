services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: thirlwall
      POSTGRES_USER: thirlwall
      POSTGRES_PASSWORD: thirlwall_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thirlwall"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
